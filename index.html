<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tell Us About Your Space Needs</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'DM Sans',sans-serif;
  background:#10141b;
  color:#eceef3;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}
.card{
  width:100%;
  max-width:480px;
  background:#161b24;
  border:1px solid #2a3242;
  border-radius:16px;
  padding:28px 24px 32px;
}
.title{font-family:'Fraunces',serif;font-weight:800;font-size:22px;color:#fff;margin-bottom:4px;}
.subtitle{font-size:13px;color:#8b93a3;margin-bottom:24px;line-height:1.5;}
label{
  display:block;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.04em;
  color:#8b93a3;
  margin-bottom:6px;
  margin-top:18px;
}
label:first-of-type{margin-top:0;}
input, select, textarea{
  width:100%;
  background:#1b212c;
  border:1.5px solid #2a3242;
  border-radius:10px;
  padding:14px 14px;
  font-size:16px;
  color:#eceef3;
  outline:none;
  font-family:'DM Sans',sans-serif;
}
textarea{min-height:70px;resize:vertical;}
input:focus, select:focus, textarea:focus{border-color:#c9932e;}
.hint{font-size:11px;color:#4c5566;margin-top:5px;}
button[type="submit"]{
  width:100%;
  margin-top:26px;
  background:#c9932e;
  color:#1a1206;
  border:none;
  border-radius:10px;
  padding:15px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
}
button[type="submit"]:disabled{opacity:.6;}
button[type="submit"]:active{opacity:.85;}
.success{
  display:none;
  text-align:center;
  padding:20px 0;
}
.success.show{display:block;}
.success .big{font-size:32px;margin-bottom:10px;}
.success .msg{font-size:15px;color:#eceef3;font-weight:600;margin-bottom:6px;}
.success .sub{font-size:12.5px;color:#8b93a3;}
.error-msg{display:none;color:#d3665e;font-size:12.5px;margin-top:14px;text-align:center;}
.error-msg.show{display:block;}
.reset-btn{
  margin-top:20px;
  background:none;
  border:1px solid #2a3242;
  color:#eceef3;
  border-radius:10px;
  padding:12px;
  width:100%;
  font-size:13px;
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
}
</style>
</head>
<body>

<div class="card">
  <div id="formView">
    <div class="title">Tell Us About Your Space Needs</div>
    <div class="subtitle">A few quick details and we'll follow up within 24 hours to talk through your options.</div>

    <form id="leadForm">
      <label>Your Full Name</label>
      <input type="text" name="fi-sender-fullName" id="fullName" placeholder="Your full name" required>

      <label>What Type of Property?</label>
      <select name="fi-select-propertyType" id="propertyType" required>
        <option value="">Select...</option>
        <option value="Residential">Residential</option>
        <option value="Commercial">Commercial</option>
      </select>

      <label>What Are You Looking To Do?</label>
      <select name="fi-select-transactionType" id="transactionType" required>
        <option value="">Select property type first...</option>
      </select>

      <label>Telephone Number</label>
      <input type="tel" name="fi-sender-phone" id="phone" placeholder="(909) 555-0100" inputmode="numeric" maxlength="14" required>

      <label>What Are You Looking For? (optional)</label>
      <textarea name="fi-text-details" id="details" placeholder="e.g. Looking for a warehouse space in Moreno Valley, around 2,000 SF, ready to move in the next 60 days..."></textarea>

      <label>Best Day to Call You</label>
      <input type="date" id="bestDate" required>

      <label>Best Time to Call You</label>
      <select id="bestTimeSlot" required>
        <option value="">Select a time...</option>
      </select>
      <input type="hidden" name="fi-text-bestTimeToCall" id="bestTimeHidden">

      <label>How Did You Hear About Us? (optional)</label>
      <input type="text" name="fi-text-source" id="source" placeholder="e.g. TikTok, Instagram, a friend...">

      <button type="submit" id="submitBtn">Send</button>
      <div class="error-msg" id="errorMsg">Something went wrong sending this. Check your connection and try again.</div>
    </form>
  </div>

  <div class="success" id="successView">
    <div class="big">✅</div>
    <div class="msg">Got it, thank you.</div>
    <div class="sub">We'll call you at the time you picked. Talk soon.</div>
    <button class="reset-btn" id="resetBtn">Submit Another</button>
  </div>
</div>

<script>
// ======================================================================
// Wired to your real Forminit form. If you ever create a new Forminit
// form and need to point this at a different one, just replace the
// FORM_ID value below with the new one from your Forminit dashboard.
// ======================================================================
const FORM_ID = 'xt1h26muvdz';

const form = document.getElementById('leadForm');
const submitBtn = document.getElementById('submitBtn');
const errorMsg = document.getElementById('errorMsg');

// ---- Property Type / Transaction Type: cascading dropdown ----
const TRANSACTION_OPTIONS = {
  Residential: ['Buy', 'Sell', 'Lease / Rent', 'Property Management'],
  Commercial: ['Buy', 'Sell', 'Lease', 'Property Management', 'Sell My Business']
};
const propertyTypeSelect = document.getElementById('propertyType');
const transactionTypeSelect = document.getElementById('transactionType');
propertyTypeSelect.addEventListener('change', ()=>{
  const opts = TRANSACTION_OPTIONS[propertyTypeSelect.value] || [];
  transactionTypeSelect.innerHTML = '<option value="">Select...</option>';
  opts.forEach(opt=>{
    const o = document.createElement('option');
    o.value = opt; o.textContent = opt;
    transactionTypeSelect.appendChild(o);
  });
});

// ---- Phone auto-formatting: (XXX) XXX-XXXX as they type ----
const phoneInput = document.getElementById('phone');
phoneInput.addEventListener('input', ()=>{
  let digits = phoneInput.value.replace(/\D/g,'').slice(0,10);
  let formatted = digits;
  if(digits.length > 6) formatted = `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
  else if(digits.length > 3) formatted = `(${digits.slice(0,3)}) ${digits.slice(3)}`;
  else if(digits.length > 0) formatted = `(${digits}`;
  phoneInput.value = formatted;
});

// ---- Best Day: date picker, defaults to tomorrow, can't pick today or the past ----
const dateInput = document.getElementById('bestDate');
const tomorrow = new Date(Date.now() + 86400000);
const tomorrowStr = tomorrow.toISOString().slice(0,10);
dateInput.min = tomorrowStr;
dateInput.value = tomorrowStr;

// ---- Best Time: dropdown, 30-minute slots, 8:30am to 5:30pm only ----
const timeSelect = document.getElementById('bestTimeSlot');
(function populateTimeSlots(){
  const slots = [];
  let h = 8, m = 30;
  while(h < 17 || (h === 17 && m <= 30)){
    const hour12 = h % 12 === 0 ? 12 : h % 12;
    const ampm = h < 12 ? 'AM' : 'PM';
    const label = `${hour12}:${m.toString().padStart(2,'0')} ${ampm}`;
    slots.push(label);
    m += 30;
    if(m >= 60){ m = 0; h += 1; }
  }
  slots.forEach(label=>{
    const o = document.createElement('option');
    o.value = label; o.textContent = label;
    timeSelect.appendChild(o);
  });
})();

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  errorMsg.classList.remove('show');

  const digitsOnly = phoneInput.value.replace(/\D/g,'');
  if(digitsOnly.length !== 10){
    errorMsg.textContent = "That phone number doesn't look complete, needs all 10 digits.";
    errorMsg.classList.add('show');
    return;
  }
  if(!timeSelect.value){
    errorMsg.textContent = "Pick a time to be called.";
    errorMsg.classList.add('show');
    return;
  }

  // Combine the date + time picker into one readable field before submitting
  const dateObj = new Date(dateInput.value + 'T00:00:00');
  const dateLabel = dateObj.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
  document.getElementById('bestTimeHidden').value = `${dateLabel} at ${timeSelect.value}`;

  submitBtn.disabled = true;
  submitBtn.textContent = 'Sending...';

  const formData = new FormData(form);
  let error = null;
  try{
    const response = await fetch(`https://forminit.com/f/${FORM_ID}`, {
      method: 'POST',
      body: formData
    });
    const result = await response.json();
    if(result && result.error) error = result.error;
  }catch(err){
    error = { message: "Couldn't reach Forminit, check your connection and try again." };
  }

  if(error){
    errorMsg.textContent = error.message || "Something went wrong sending this. Check your connection and try again.";
    errorMsg.classList.add('show');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Send';
    return;
  }

  document.getElementById('formView').style.display = 'none';
  document.getElementById('successView').classList.add('show');
});

document.getElementById('resetBtn').addEventListener('click', ()=>{
  form.reset();
  dateInput.value = tomorrowStr;
  submitBtn.disabled = false;
  submitBtn.textContent = 'Send';
  document.getElementById('successView').classList.remove('show');
  document.getElementById('formView').style.display = 'block';
});
</script>
</body>
</html>
